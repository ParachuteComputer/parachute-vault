app = "parachute-vault"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "1940"
  PARACHUTE_HOME = "/data"

[http_service]
  internal_port = 1940
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"

[[mounts]]
  source = "vault_data"
  destination = "/data"
